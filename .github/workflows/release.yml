name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}

      - name: Get plugin name
        id: plugin
        run: |
          NAME=$(jq -r '.name | gsub(" "; "-")' dist/manifest.json)
          VERSION="${GITHUB_REF_NAME}"
          echo "filename=${NAME}-${VERSION}-release" >> $GITHUB_OUTPUT

      - name: Zip dist
        run: zip -r "${{ steps.plugin.outputs.filename }}.zip" dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: "${{ steps.plugin.outputs.filename }}.zip"
